<html lang="ko">
<head>
    <meta charset="UTF-8">

    <title>주소아지트</title>

<body style="background-color: #0b0f19; background-image: linear-gradient(to right, rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(to bottom, rgba(255,255,255,0.02) 1px, transparent 1px); background-size: 40px 40px; min-height: 100vh; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; margin: 0; padding: 0; box-sizing: border-box;">

    <!-- 중앙 고급스러운 카드 컨테이너 -->
    <div style="background-color: #0e1626; border: 1px solid #1e293b; border-radius: 16px; padding: 48px; max-width: 400px; width: 90%; text-align: center; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7); display: flex; flex-direction: column; align-items: center; justify-content: center;">
        
        <!-- 상단 2026 NEW 라벨 -->
        <span style="font-size: 11px; color: #94a3b8; letter-spacing: 2px; display: block; margin-bottom: 6px; font-weight: 600;">2026 NEW</span>
        
        <!-- 메인 로고 영역 (주소아지트) -->
        <div style="display: flex; align-items: center; justify-content: center; gap: 4px; margin-bottom: 12px;">
            <span style="font-size: 24px; font-weight: 900; letter-spacing: -1px; color: #ffffff;">주소</span>
            <span style="font-size: 24px; font-weight: 900; color: #000000; background-color: #ff8a00; padding: 2px 8px; border-radius: 4px; margin-left: 2px;">아지트</span>
        </div>
        
        <!-- 하단 시그니처 언더라인 -->
        <div style="width: 48px; height: 4px; background-color: #ff8a00; border-radius: 2px; margin-bottom: 24px;"></div>

        <!-- 메인 타이틀 -->
        <h1 style="font-size: 22px; font-weight: 700; color: #ffffff; margin-top: 0; margin-bottom: 12px; letter-spacing: -0.5px;">
            공식 주소아지트 커뮤니티
        </h1>

        <!-- 서브 설명 -->
        <p style="font-size: 14px; color: #64748b; margin-top: 0; margin-bottom: 36px; font-weight: 500; line-height: 1.5;">
            안전한 공식 주소와 최신 정보를 확인하세요
        </p>

        <!-- 바로가기 버튼 (한글 도메인 브라우저 호환성 무조건 해결 버전) -->
        <a href="https://주소아지트.com" target="_blank" rel="noopener noreferrer" style="display: block; width: 100%; padding: 14px 0; background: linear-gradient(135deg, #ff9f1c 0%, #ff8a00 100%); color: #000000; font-size: 16px; font-weight: 800; border-radius: 8px; text-decoration: none; box-shadow: 0 4px 20px rgba(255, 138, 0, 0.3); box-sizing: border-box;">
            주소아지트 바로가기
        </a>

    </div>

</body>
</html>
